<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoundChat</title>
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     LOGIN VIEW
═══════════════════════════════════════════════════ -->
<div id="view-login" class="view active">
  <div class="login-card">
    <h1 class="brand">RoundChat</h1>
    <p class="brand-sub">Chat powered by email</p>

    <label class="field-label" for="login-email">Email address</label>
    <input id="login-email" type="email" class="field" placeholder="you@example.com"
           autocomplete="email" autocapitalize="none" spellcheck="false" />

    <label class="field-label" for="login-password">Password</label>
    <input id="login-password" type="password" class="field" placeholder="••••••••"
           autocomplete="current-password" />

    <button id="login-btn" class="btn btn-primary" type="button">Sign in</button>
    <p id="login-error" class="error-msg hidden"></p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     MAIN VIEW (tabs + panes)
═══════════════════════════════════════════════════ -->
<div id="view-main" class="view">

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab active" data-pane="pane-chats">
      <span class="tab-icon">💬</span>
      <span class="tab-label">Chats</span>
    </button>
    <button class="tab" data-pane="pane-contacts">
      <span class="tab-icon">👤</span>
      <span class="tab-label">Contacts</span>
    </button>
    <button class="tab" data-pane="pane-settings">
      <span class="tab-icon">⚙️</span>
      <span class="tab-label">Settings</span>
    </button>
  </nav>

  <!-- Pane: Chats -->
  <div id="pane-chats" class="pane active">
    <div class="pane-header">
      <h2>Chats</h2>
      <button id="btn-refresh" class="icon-btn" title="Refresh">⟳</button>
    </div>
    <div id="conversations-list" class="scroll-list">
      <div class="placeholder">Loading…</div>
    </div>
  </div>

  <!-- Pane: Contacts -->
  <div id="pane-contacts" class="pane">
    <div class="pane-header">
      <h2>Contacts</h2>
      <button id="btn-refresh-contacts" class="icon-btn" title="Refresh">⟳</button>
    </div>
    <div id="contacts-list" class="scroll-list">
      <div class="placeholder">Loading…</div>
    </div>
  </div>

  <!-- Pane: Settings -->
  <div id="pane-settings" class="pane">
    <div class="pane-header">
      <h2>Settings</h2>
    </div>
    <div class="settings-content">
      <button id="btn-settings-theme" class="btn btn-outline settings-theme-btn">
        <span id="settings-theme-icon">🌙</span>
        <span id="settings-theme-label">Dark mode</span>
      </button>
      <button id="btn-settings-signout" class="btn btn-outline settings-signout-btn">
        ↩ Sign out
      </button>
    </div>
  </div>

</div><!-- /view-main -->

<!-- ═══════════════════════════════════════════════════
     CHAT DETAIL OVERLAY
═══════════════════════════════════════════════════ -->
<div id="chat-overlay" class="overlay hidden">
  <div class="chat-header">
    <button id="btn-back" class="icon-btn back-btn">←</button>
    <span id="chat-title" class="chat-title-text"></span>
    <button id="btn-chat-refresh" class="icon-btn" title="Refresh">⟳</button>
  </div>
  <div id="chat-messages" class="chat-messages"></div>
  <div id="attach-picker" class="attach-picker hidden">
    <div class="attach-picker-header">
      <span class="attach-picker-title">Attach file</span>
      <button id="btn-close-attach" class="icon-btn" type="button">✕</button>
    </div>
    <div id="attach-grid" class="attach-grid">
      <div class="placeholder">Loading…</div>
    </div>
    <div class="attach-picker-footer">
      <button id="btn-upload-attach" class="btn btn-outline attach-upload-btn" type="button">+ Upload file</button>
      <input id="attach-file-input" type="file" class="hidden" />
    </div>
  </div>
  <div id="attach-chips" class="attach-chips hidden"></div>
  <form id="chat-form" class="chat-input-row">
    <button type="button" id="btn-attach" class="btn-attach" title="Attach file">📎</button>
    <input id="chat-input" type="text" class="chat-field"
           placeholder="Message…" autocomplete="off" />
    <button type="submit" class="btn btn-send">Send</button>
  </form>
</div>

<div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <h3 id="modal-title">Notice</h3>
    <p id="modal-message"></p>
    <div class="modal-actions">
      <button id="modal-ok" class="btn btn-primary" type="button">OK</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>navigator.serviceWorker?.register("/sw.js");</script>
</body>
</html>
